name: NOVA Sovereign Build Check

on:
  push:
    paths:
      - '**/*.mo'
      - 'scripts/nova'
      - 'nova.json'
      - '.github/workflows/motoko-check.yml'
  pull_request:
    paths:
      - '**/*.mo'
      - 'scripts/nova'
      - 'nova.json'
      - '.github/workflows/motoko-check.yml'

permissions:
  contents: read

jobs:
  motoko-check:
    name: Sovereign Motoko Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run sovereign check
        run: ./scripts/nova check
