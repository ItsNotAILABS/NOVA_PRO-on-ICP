<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NOVA Protocol</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a14;--card:#12121f;--border:#1a1a2e;--input-bg:#0e0e1a;
  --gold:#c9a84c;--gold-dim:#8b6914;--gold-bg:rgba(201,168,76,0.1);
  --green:#4caf50;--red:#f44336;--cyan:#00bcd4;--blue:#2196f3;
  --text:#e0e0e0;--dim:#666;--muted:#999;
  --mono:'SF Mono','Fira Code','Cascadia Code',Consolas,monospace;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
}
html,body{width:420px;min-height:520px;max-height:600px;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13px;line-height:1.5;overflow:hidden}

/* Header */
.header{background:linear-gradient(135deg,#c9a84c 0%,#8b6914 100%);padding:12px 16px;display:flex;align-items:center;justify-content:space-between}
.header-left{display:flex;align-items:center;gap:10px}
.logo{width:28px;height:28px;border-radius:6px;background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff}
.header-title{color:#fff;font-size:15px;font-weight:700;letter-spacing:1px}
.header-sub{color:rgba(255,255,255,0.7);font-size:10px}
.header-right{display:flex;gap:6px}
.header-btn{background:rgba(255,255,255,0.15);border:none;border-radius:6px;padding:6px 8px;color:#fff;cursor:pointer;font-size:12px}
.header-btn:hover{background:rgba(255,255,255,0.25)}

/* Tabs */
.tabs{display:flex;border-bottom:1px solid var(--border);background:var(--card)}
.tab{flex:1;padding:10px;text-align:center;font-size:11px;font-weight:600;color:var(--dim);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s;text-transform:uppercase;letter-spacing:.5px}
.tab:hover{color:var(--text)}
.tab.active{color:var(--gold);border-bottom-color:var(--gold)}

/* Tab Content */
.tab-content{display:none;flex-direction:column;height:calc(100% - 95px);overflow:hidden}
.tab-content.active{display:flex}

/* ── CHAT TAB ─────────────────────────────────────────────── */
.chat-messages{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
.msg{padding:10px 14px;border-radius:12px;line-height:1.6;white-space:pre-wrap;word-break:break-word;font-size:13px;max-width:95%}
.msg-user{background:var(--card);border:1px solid var(--border);align-self:flex-end;border-bottom-right-radius:4px}
.msg-assistant{background:#1e3a2f;border-left:3px solid var(--gold);align-self:flex-start;border-bottom-left-radius:4px}
.msg-system{background:var(--gold-bg);border:1px solid var(--gold);color:var(--gold);font-size:11px;align-self:center;text-align:center;border-radius:8px}
.msg-meta{font-size:10px;color:var(--dim);margin-top:4px;font-family:var(--mono)}

.chat-input-area{display:flex;gap:8px;padding:10px 12px;border-top:1px solid var(--border);background:var(--card)}
.chat-input{flex:1;background:var(--input-bg);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:13px;font-family:var(--sans);resize:none;outline:none;min-height:36px;max-height:80px}
.chat-input:focus{border-color:var(--gold)}
.chat-input::placeholder{color:var(--dim)}
.chat-send{background:linear-gradient(135deg,var(--gold),var(--gold-dim));border:none;border-radius:8px;padding:8px 14px;color:#fff;font-weight:700;cursor:pointer;font-size:14px;min-width:40px}
.chat-send:hover{filter:brightness(1.15)}

.engine-selector{display:flex;gap:6px;padding:6px 12px;border-top:1px solid var(--border);background:var(--card);align-items:center}
.engine-label{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;white-space:nowrap}
.engine-select{flex:1;background:var(--input-bg);border:1px solid var(--border);border-radius:6px;padding:4px 8px;color:var(--text);font-size:11px;font-family:var(--mono);cursor:pointer}
.engine-select:focus{border-color:var(--gold);outline:none}

/* ── ENGINES TAB ──────────────────────────────────────────── */
.engines-list{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:6px}
.engine-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 12px;cursor:pointer;transition:all .2s;display:flex;gap:10px;align-items:center}
.engine-card:hover{border-color:var(--gold)}
.engine-card.selected{border-color:var(--gold);background:var(--gold-bg)}
.engine-icon{width:32px;height:32px;border-radius:6px;background:linear-gradient(135deg,var(--gold),var(--gold-dim));display:flex;align-items:center;justify-content:center;font-size:14px;color:#fff;font-weight:700;flex-shrink:0}
.engine-info{flex:1;min-width:0}
.engine-name{font-size:12px;font-weight:700;color:var(--text)}
.engine-id{font-size:10px;color:var(--gold);font-family:var(--mono)}
.engine-desc{font-size:10px;color:var(--dim);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.engine-mods{display:flex;gap:3px;margin-top:3px}
.mod-badge{font-size:9px;padding:1px 5px;border-radius:3px;background:rgba(0,188,212,0.1);color:var(--cyan);border:1px solid rgba(0,188,212,0.2)}

/* ── DASHBOARD TAB ────────────────────────────────────────── */
.dashboard{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
.dash-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.dash-stat{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px;text-align:center}
.dash-stat-val{font-size:20px;font-weight:700;font-family:var(--mono);color:var(--gold)}
.dash-stat-label{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.dash-card{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px}
.dash-card-title{font-size:11px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.dash-item{display:flex;justify-content:space-between;padding:4px 0;font-size:11px;border-bottom:1px solid var(--border)}
.dash-item:last-child{border:none}
.dash-item-label{color:var(--dim)}
.dash-item-val{color:var(--text);font-family:var(--mono)}
.dash-btn{width:100%;background:linear-gradient(135deg,var(--gold),var(--gold-dim));border:none;border-radius:8px;padding:10px;color:#fff;font-weight:700;cursor:pointer;font-size:12px;margin-top:6px}
.dash-btn:hover{filter:brightness(1.15)}
.dash-btn-secondary{background:var(--card);border:1px solid var(--border);color:var(--text)}
.dash-btn-secondary:hover{border-color:var(--gold)}

/* ── SETTINGS TAB ─────────────────────────────────────────── */
.settings{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
.setting-group{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px}
.setting-title{font-size:11px;font-weight:700;color:var(--gold);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.setting-row{display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)}
.setting-row:last-child{border:none}
.setting-label{font-size:12px;color:var(--text)}
.setting-desc{font-size:10px;color:var(--dim)}
.toggle{width:40px;height:22px;border-radius:11px;background:var(--border);position:relative;cursor:pointer;transition:background .2s;border:none}
.toggle.on{background:var(--gold)}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left .2s}
.toggle.on::after{left:21px}
.setting-input{background:var(--input-bg);border:1px solid var(--border);border-radius:6px;padding:6px 10px;color:var(--text);font-size:12px;width:180px;font-family:var(--mono)}
.setting-input:focus{border-color:var(--gold);outline:none}
.version-info{text-align:center;padding:12px;color:var(--dim);font-size:10px}
.version-info .gold{color:var(--gold)}

/* Scrollbar */
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--gold-dim)}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <div class="logo">✦</div>
    <div>
      <div class="header-title">NOVA PROTOCOL</div>
      <div class="header-sub">23 Engines · Sovereign AI</div>
    </div>
  </div>
  <div class="header-right">
    <button class="header-btn" id="btn-sidebar" title="Open Sidebar Panel">◧</button>
    <button class="header-btn" id="btn-dashboard" title="Open Full Dashboard">◫</button>
  </div>
</div>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" data-tab="chat">💬 Chat</div>
  <div class="tab" data-tab="engines">⚡ Engines</div>
  <div class="tab" data-tab="dashboard">📊 Dashboard</div>
  <div class="tab" data-tab="settings">⚙️ Settings</div>
</div>

<!-- CHAT TAB -->
<div class="tab-content active" id="tab-chat">
  <div class="chat-messages" id="chat-messages">
    <div class="msg msg-system">
      ✦ NOVA Protocol v2.0 — 23 engines online<br>
      Type anything to talk to your sovereign AI
    </div>
  </div>
  <div class="engine-selector">
    <span class="engine-label">Engine:</span>
    <select class="engine-select" id="engine-select"></select>
  </div>
  <div class="chat-input-area">
    <textarea class="chat-input" id="chat-input" placeholder="Ask NOVA anything..." rows="1"></textarea>
    <button class="chat-send" id="chat-send">▶</button>
  </div>
</div>

<!-- ENGINES TAB -->
<div class="tab-content" id="tab-engines">
  <div class="engines-list" id="engines-list"></div>
</div>

<!-- DASHBOARD TAB -->
<div class="tab-content" id="tab-dashboard">
  <div class="dashboard" id="dashboard"></div>
</div>

<!-- SETTINGS TAB -->
<div class="tab-content" id="tab-settings">
  <div class="settings" id="settings"></div>
</div>

<script>
(function() {
  'use strict';

  // ── Engine data (embedded for instant load) ────────────────
  const ENGINES = [
    { id:'NOV-001', name:'Nova Cognos',      slug:'cognos',      desc:'Deep reasoning & multi-step logic',                mods:['text','vision'] },
    { id:'NOV-002', name:'Nova Profundis',   slug:'profundis',   desc:'Extended context analysis (2M tokens)',             mods:['text'] },
    { id:'NOV-003', name:'Nova Fusio',       slug:'fusio',       desc:'Multi-modal fusion (text+vision+audio+video)',      mods:['text','vision','audio','video'] },
    { id:'NOV-004', name:'Nova Lingua',      slug:'lingua',      desc:'Multilingual translation & understanding',         mods:['text'] },
    { id:'NOV-005', name:'Nova Stratos',     slug:'stratos',     desc:'Strategic planning & decision analysis',           mods:['text'] },
    { id:'NOV-006', name:'Nova Memoria',     slug:'memoria',     desc:'Long-term memory & retrieval',                     mods:['text'] },
    { id:'NOV-007', name:'Nova Vector',      slug:'vector',      desc:'Embedding & vector operations',                    mods:['embedding'] },
    { id:'NOV-008', name:'Nova Codex',       slug:'codex',       desc:'Code generation & analysis',                       mods:['code','text'] },
    { id:'NOV-009', name:'Nova Pictor',      slug:'pictor',      desc:'Image generation & editing',                       mods:['image-gen'] },
    { id:'NOV-010', name:'Nova Kinema',      slug:'kinema',      desc:'Video generation & processing',                    mods:['video-gen'] },
    { id:'NOV-011', name:'Nova Harmonia',    slug:'harmonia',    desc:'Music generation & audio creation',                mods:['music-gen','audio-gen'] },
    { id:'NOV-012', name:'Nova Segmentum',   slug:'segmentum',   desc:'Visual segmentation & object detection',           mods:['vision'] },
    { id:'NOV-013', name:'Nova Scrutator',   slug:'scrutator',   desc:'Search & information retrieval',                   mods:['search','text'] },
    { id:'NOV-014', name:'Nova Custodis',    slug:'custodis',    desc:'Safety & content moderation',                      mods:['safety'] },
    { id:'NOV-015', name:'Nova Ranker',      slug:'ranker',      desc:'Relevance scoring & reranking',                    mods:['text'] },
    { id:'NOV-016', name:'Nova Formalis',    slug:'formalis',    desc:'Mathematical reasoning & proofs',                  mods:['math','text'] },
    { id:'NOV-017', name:'Nova Algorithmus', slug:'algorithmus', desc:'Algorithm design & optimization',                  mods:['code','text'] },
    { id:'NOV-018', name:'Nova Vox',         slug:'vox',         desc:'Voice synthesis & speech generation',              mods:['voice-gen','audio-gen'] },
    { id:'NOV-019', name:'Nova Socialis',    slug:'socialis',    desc:'Social intelligence & sentiment analysis',         mods:['text'] },
    { id:'NOV-020', name:'Nova Empathos',    slug:'empathos',    desc:'Empathic AI & emotional understanding',            mods:['text'] },
    { id:'NOV-021', name:'Nova Analytica',   slug:'analytica',   desc:'Data analysis & insights extraction',              mods:['text','structured'] },
    { id:'NOV-022', name:'Nova Structura',   slug:'structura',   desc:'Structured data & schema generation',              mods:['structured','text'] },
    { id:'NOV-023', name:'Nova Visio',       slug:'visio',       desc:'Vision-language alignment & understanding',        mods:['vision','text'] },
  ];

  let selectedEngine = 'NOV-001';

  // ── DOM ─────────────────────────────────────────────────────
  const $ = id => document.getElementById(id);
  const chatMessages = $('chat-messages');
  const chatInput    = $('chat-input');
  const chatSend     = $('chat-send');
  const engineSelect = $('engine-select');
  const enginesList  = $('engines-list');
  const dashboard    = $('dashboard');
  const settings     = $('settings');

  // ── Tabs ────────────────────────────────────────────────────
  document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
      tab.classList.add('active');
      $('tab-' + tab.dataset.tab).classList.add('active');
    });
  });

  // ── Header buttons ─────────────────────────────────────────
  $('btn-sidebar').addEventListener('click', () => {
    chrome.runtime.sendMessage({ type: 'NOVA_OPEN_SIDEBAR', payload: {} });
  });
  $('btn-dashboard').addEventListener('click', () => {
    chrome.runtime.sendMessage({ type: 'NOVA_OPEN_DASHBOARD', payload: {} });
  });

  // ── Populate engine selector ───────────────────────────────
  ENGINES.forEach(e => {
    const opt = document.createElement('option');
    opt.value = e.id;
    opt.textContent = `${e.name} (${e.id})`;
    engineSelect.appendChild(opt);
  });
  engineSelect.addEventListener('change', () => {
    selectedEngine = engineSelect.value;
    chrome.runtime.sendMessage({ type: 'NOVA_SELECT_ENGINE', payload: { engineId: selectedEngine } });
  });

  // ── Populate engines list ──────────────────────────────────
  ENGINES.forEach(e => {
    const card = document.createElement('div');
    card.className = 'engine-card' + (e.id === selectedEngine ? ' selected' : '');
    card.innerHTML = `
      <div class="engine-icon">${e.name.split(' ')[1]?.[0] || '✦'}</div>
      <div class="engine-info">
        <div class="engine-name">${e.name}</div>
        <div class="engine-id">${e.id} · ${e.slug}</div>
        <div class="engine-desc">${e.desc}</div>
        <div class="engine-mods">${e.mods.map(m => `<span class="mod-badge">${m}</span>`).join('')}</div>
      </div>
    `;
    card.addEventListener('click', () => {
      document.querySelectorAll('.engine-card').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
      selectedEngine = e.id;
      engineSelect.value = e.id;
      chrome.runtime.sendMessage({ type: 'NOVA_SELECT_ENGINE', payload: { engineId: e.id } });
    });
    enginesList.appendChild(card);
  });

  // ── Build dashboard ────────────────────────────────────────
  function buildDashboard(status) {
    const hb = status?.heartbeats || 0;
    dashboard.innerHTML = `
      <div class="dash-stats">
        <div class="dash-stat"><div class="dash-stat-val">23</div><div class="dash-stat-label">Engines</div></div>
        <div class="dash-stat"><div class="dash-stat-val">19</div><div class="dash-stat-label">Workers</div></div>
        <div class="dash-stat"><div class="dash-stat-val">40</div><div class="dash-stat-label">Agents</div></div>
        <div class="dash-stat"><div class="dash-stat-val">${hb}</div><div class="dash-stat-label">Heartbeats</div></div>
        <div class="dash-stat"><div class="dash-stat-val">${status?.chatHistoryCount || 0}</div><div class="dash-stat-label">Messages</div></div>
        <div class="dash-stat"><div class="dash-stat-val">${status?.shields?.active ? '🛡️' : '⚪'}</div><div class="dash-stat-label">Shields</div></div>
      </div>
      <div class="dash-card">
        <div class="dash-card-title">System Status</div>
        <div class="dash-item"><span class="dash-item-label">Boot State</span><span class="dash-item-val" style="color:var(--green)">✅ ACTIVE</span></div>
        <div class="dash-item"><span class="dash-item-label">Selected Engine</span><span class="dash-item-val">${status?.selectedEngine || 'NOV-001'}</span></div>
        <div class="dash-item"><span class="dash-item-label">Sovereign Mode</span><span class="dash-item-val" style="color:var(--gold)">✅ ON</span></div>
        <div class="dash-item"><span class="dash-item-label">φ Constant</span><span class="dash-item-val">1.6180339...</span></div>
        <div class="dash-item"><span class="dash-item-label">Heartbeat</span><span class="dash-item-val">873ms</span></div>
        <div class="dash-item"><span class="dash-item-label">Protocol</span><span class="dash-item-val">nova-wire</span></div>
      </div>
      <div class="dash-card">
        <div class="dash-card-title">Architecture</div>
        <div class="dash-item"><span class="dash-item-label">Worker Houses</span><span class="dash-item-val">Brain · Protocol · Shield · Production · Infrastructure · Market · University · Career</span></div>
        <div class="dash-item"><span class="dash-item-label">Organism Rings</span><span class="dash-item-val">9</span></div>
        <div class="dash-item"><span class="dash-item-label">Extensions</span><span class="dash-item-val">20</span></div>
        <div class="dash-item"><span class="dash-item-label">Protocols</span><span class="dash-item-val">10</span></div>
      </div>
      <button class="dash-btn" id="btn-open-full-dashboard">Open Full Dashboard ◫</button>
      <button class="dash-btn dash-btn-secondary" id="btn-clear-history">Clear Chat History</button>
    `;

    $('btn-open-full-dashboard')?.addEventListener('click', () => {
      chrome.runtime.sendMessage({ type: 'NOVA_OPEN_DASHBOARD', payload: {} });
    });
    $('btn-clear-history')?.addEventListener('click', () => {
      chrome.runtime.sendMessage({ type: 'NOVA_CLEAR_HISTORY', payload: {} }, () => {
        chatMessages.innerHTML = '<div class="msg msg-system">✦ Chat history cleared</div>';
      });
    });
  }

  // ── Build settings ─────────────────────────────────────────
  function buildSettings(config) {
    settings.innerHTML = `
      <div class="setting-group">
        <div class="setting-title">General</div>
        <div class="setting-row">
          <div>
            <div class="setting-label">Sovereign Mode</div>
            <div class="setting-desc">Run all AI locally — no external APIs</div>
          </div>
          <button class="toggle ${config?.sovereignMode !== false ? 'on' : ''}" id="toggle-sovereign"></button>
        </div>
        <div class="setting-row">
          <div>
            <div class="setting-label">Dark Theme</div>
            <div class="setting-desc">Use dark interface theme</div>
          </div>
          <button class="toggle ${config?.theme !== 'light' ? 'on' : ''}" id="toggle-theme"></button>
        </div>
      </div>
      <div class="setting-group">
        <div class="setting-title">API Configuration</div>
        <div class="setting-row" style="flex-direction:column;gap:6px">
          <div class="setting-label">API Key (optional — for external models)</div>
          <input class="setting-input" id="input-apikey" type="password" placeholder="nova-key-..." style="width:100%">
        </div>
        <div class="setting-row" style="flex-direction:column;gap:6px">
          <div class="setting-label">Base URL</div>
          <input class="setting-input" id="input-baseurl" type="text" placeholder="https://api.nova-protocol.ai" style="width:100%" value="${config?.baseUrl || ''}">
        </div>
      </div>
      <div class="setting-group">
        <div class="setting-title">Sidebar</div>
        <div class="setting-row">
          <div class="setting-label">Position</div>
          <select class="setting-input" id="select-position" style="width:120px">
            <option value="right" ${config?.sidebarPosition !== 'left' ? 'selected' : ''}>Right</option>
            <option value="left" ${config?.sidebarPosition === 'left' ? 'selected' : ''}>Left</option>
          </select>
        </div>
      </div>
      <div class="version-info">
        <span class="gold">NOVA Protocol v2.0.0</span> · Aurum Primum<br>
        23 Engines · 19 Workers · 40 Agents · φ = 1.618...<br>
        Casa de Medina — Sovereign Intelligence Architecture
      </div>
    `;

    $('toggle-sovereign')?.addEventListener('click', function() {
      this.classList.toggle('on');
      chrome.runtime.sendMessage({ type: 'NOVA_SET_CONFIG', payload: { sovereignMode: this.classList.contains('on') } });
    });
    $('toggle-theme')?.addEventListener('click', function() {
      this.classList.toggle('on');
      chrome.runtime.sendMessage({ type: 'NOVA_SET_CONFIG', payload: { theme: this.classList.contains('on') ? 'dark' : 'light' } });
    });
    $('input-apikey')?.addEventListener('change', function() {
      chrome.runtime.sendMessage({ type: 'NOVA_SET_CONFIG', payload: { apiKey: this.value } });
    });
    $('input-baseurl')?.addEventListener('change', function() {
      chrome.runtime.sendMessage({ type: 'NOVA_SET_CONFIG', payload: { baseUrl: this.value } });
    });
    $('select-position')?.addEventListener('change', function() {
      chrome.runtime.sendMessage({ type: 'NOVA_SET_CONFIG', payload: { sidebarPosition: this.value } });
    });
  }

  // ── Chat ────────────────────────────────────────────────────
  function addMessage(role, content, meta) {
    const div = document.createElement('div');
    div.className = `msg msg-${role}`;
    div.textContent = content;
    if (meta) {
      const metaEl = document.createElement('div');
      metaEl.className = 'msg-meta';
      metaEl.textContent = meta;
      div.appendChild(metaEl);
    }
    chatMessages.appendChild(div);
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }

  async function sendChat() {
    const text = chatInput.value.trim();
    if (!text) return;

    chatInput.value = '';
    chatInput.style.height = 'auto';
    addMessage('user', text);

    // Show typing indicator
    const typingDiv = document.createElement('div');
    typingDiv.className = 'msg msg-assistant';
    typingDiv.textContent = '⏳ Processing...';
    typingDiv.id = 'typing';
    chatMessages.appendChild(typingDiv);
    chatMessages.scrollTop = chatMessages.scrollHeight;

    try {
      const response = await chrome.runtime.sendMessage({
        type: 'NOVA_CHAT_REQUEST',
        engineId: selectedEngine,
        payload: {
          messages: [{ role: 'user', content: text }],
        },
      });

      // Remove typing indicator
      typingDiv.remove();

      if (response?.error) {
        addMessage('system', '⚠️ ' + response.error);
      } else if (response?.content) {
        const meta = `${response.engineName || ''} · attestation: ${response.attestation || '—'}`;
        addMessage('assistant', response.content, meta);
      }
    } catch (err) {
      typingDiv.remove();
      addMessage('system', '⚠️ Error: ' + (err.message || err));
    }
  }

  chatSend.addEventListener('click', sendChat);
  chatInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendChat();
    }
  });

  // Auto-resize textarea
  chatInput.addEventListener('input', () => {
    chatInput.style.height = 'auto';
    chatInput.style.height = Math.min(chatInput.scrollHeight, 80) + 'px';
  });

  // ── Init ────────────────────────────────────────────────────
  chrome.runtime.sendMessage({ type: 'NOVA_GET_STATUS', payload: {} }, (status) => {
    if (status) {
      selectedEngine = status.selectedEngine || 'NOV-001';
      engineSelect.value = selectedEngine;
      buildDashboard(status);
      buildSettings(status.config);
    } else {
      buildDashboard({});
      buildSettings({});
    }
  });

  // Load chat history
  chrome.runtime.sendMessage({ type: 'NOVA_GET_HISTORY', payload: {} }, (result) => {
    if (result?.history?.length > 0) {
      result.history.forEach(m => {
        if (m.role === 'user' || m.role === 'assistant') {
          addMessage(m.role, m.content);
        }
      });
    }
  });
})();
</script>
</body>
</html>
