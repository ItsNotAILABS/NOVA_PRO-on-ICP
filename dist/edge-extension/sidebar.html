<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>NOVA AI Sidebar</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a14;--card:#12121f;--border:#1a1a2e;--input-bg:#0e0e1a;
  --gold:#c9a84c;--gold-dim:#8b6914;
  --green:#4caf50;--red:#f44336;--cyan:#00bcd4;
  --text:#e0e0e0;--dim:#666;
  --mono:'SF Mono','Fira Code','Cascadia Code',Consolas,monospace;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
}
html,body{width:100%;height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:13px;line-height:1.5;overflow:hidden;display:flex;flex-direction:column}

.header{background:linear-gradient(135deg,#c9a84c 0%,#8b6914 100%);padding:10px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.header-icon{font-size:18px}
.header-title{color:#fff;font-size:14px;font-weight:700;letter-spacing:1px;flex:1}
.header-engine{color:rgba(255,255,255,0.8);font-size:10px;font-family:var(--mono)}

.engine-bar{display:flex;gap:6px;padding:8px 12px;border-bottom:1px solid var(--border);background:var(--card);flex-shrink:0;align-items:center}
.engine-bar-label{font-size:10px;color:var(--dim);text-transform:uppercase;white-space:nowrap}
.engine-bar-select{flex:1;background:var(--input-bg);border:1px solid var(--border);border-radius:6px;padding:4px 8px;color:var(--text);font-size:11px;font-family:var(--mono)}
.engine-bar-select:focus{border-color:var(--gold);outline:none}

.chat-area{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
.msg{padding:10px 14px;border-radius:12px;line-height:1.6;white-space:pre-wrap;word-break:break-word;font-size:13px;max-width:92%}
.msg-user{background:var(--card);border:1px solid var(--border);align-self:flex-end;border-bottom-right-radius:4px}
.msg-assistant{background:#1e3a2f;border-left:3px solid var(--gold);align-self:flex-start;border-bottom-left-radius:4px}
.msg-system{background:rgba(201,168,76,0.1);border:1px solid var(--gold);color:var(--gold);font-size:11px;align-self:center;text-align:center;border-radius:8px;padding:8px 14px}
.msg-meta{font-size:10px;color:var(--dim);margin-top:4px;font-family:var(--mono)}

.input-area{display:flex;gap:8px;padding:10px 12px;border-top:1px solid var(--border);background:var(--card);flex-shrink:0}
.chat-input{flex:1;background:var(--input-bg);border:1px solid var(--border);border-radius:8px;padding:8px 12px;color:var(--text);font-size:13px;font-family:var(--sans);resize:none;outline:none;min-height:36px;max-height:120px}
.chat-input:focus{border-color:var(--gold)}
.chat-input::placeholder{color:var(--dim)}
.chat-send{background:linear-gradient(135deg,var(--gold),var(--gold-dim));border:none;border-radius:8px;padding:8px 16px;color:#fff;font-weight:700;cursor:pointer;font-size:16px}
.chat-send:hover{filter:brightness(1.15)}

.quick-actions{display:flex;gap:4px;padding:4px 12px;border-top:1px solid var(--border);background:var(--card);flex-shrink:0;overflow-x:auto}
.quick-btn{background:var(--input-bg);border:1px solid var(--border);border-radius:6px;padding:4px 8px;color:var(--dim);font-size:10px;cursor:pointer;white-space:nowrap}
.quick-btn:hover{border-color:var(--gold);color:var(--gold)}

::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--gold-dim)}
</style>
</head>
<body>

<div class="header">
  <span class="header-icon">✦</span>
  <span class="header-title">NOVA AI</span>
  <span class="header-engine" id="engine-name">Nova Cognos</span>
</div>

<div class="engine-bar">
  <span class="engine-bar-label">Engine:</span>
  <select class="engine-bar-select" id="engine-select"></select>
</div>

<div class="chat-area" id="chat-area">
  <div class="msg msg-system">
    ✦ NOVA Sidebar Active — 23 engines ready<br>
    Select text on any page for AI actions, or chat here.
  </div>
</div>

<div class="quick-actions">
  <button class="quick-btn" data-q="Summarize this page">📋 Summarize</button>
  <button class="quick-btn" data-q="Explain the key concepts">💡 Explain</button>
  <button class="quick-btn" data-q="What are the main facts?">📊 Facts</button>
  <button class="quick-btn" data-q="Translate to English">🌐 Translate</button>
  <button class="quick-btn" data-q="Analyze the code">💻 Code</button>
  <button class="quick-btn" data-q="Check for accuracy">✅ Fact Check</button>
</div>

<div class="input-area">
  <textarea class="chat-input" id="chat-input" placeholder="Ask NOVA anything..." rows="1"></textarea>
  <button class="chat-send" id="chat-send">▶</button>
</div>

<script>
(function() {
  'use strict';

  const ENGINES = [
    { id:'NOV-001', name:'Nova Cognos' },{ id:'NOV-002', name:'Nova Profundis' },
    { id:'NOV-003', name:'Nova Fusio' },{ id:'NOV-004', name:'Nova Lingua' },
    { id:'NOV-005', name:'Nova Stratos' },{ id:'NOV-006', name:'Nova Memoria' },
    { id:'NOV-007', name:'Nova Vector' },{ id:'NOV-008', name:'Nova Codex' },
    { id:'NOV-009', name:'Nova Pictor' },{ id:'NOV-010', name:'Nova Kinema' },
    { id:'NOV-011', name:'Nova Harmonia' },{ id:'NOV-012', name:'Nova Segmentum' },
    { id:'NOV-013', name:'Nova Scrutator' },{ id:'NOV-014', name:'Nova Custodis' },
    { id:'NOV-015', name:'Nova Ranker' },{ id:'NOV-016', name:'Nova Formalis' },
    { id:'NOV-017', name:'Nova Algorithmus' },{ id:'NOV-018', name:'Nova Vox' },
    { id:'NOV-019', name:'Nova Socialis' },{ id:'NOV-020', name:'Nova Empathos' },
    { id:'NOV-021', name:'Nova Analytica' },{ id:'NOV-022', name:'Nova Structura' },
    { id:'NOV-023', name:'Nova Visio' },
  ];

  let selectedEngine = 'NOV-001';
  const $ = id => document.getElementById(id);
  const chatArea = $('chat-area');
  const chatInput = $('chat-input');
  const engineSelect = $('engine-select');
  const engineName = $('engine-name');

  // Populate engine selector
  ENGINES.forEach(e => {
    const opt = document.createElement('option');
    opt.value = e.id;
    opt.textContent = `${e.name} (${e.id})`;
    engineSelect.appendChild(opt);
  });
  engineSelect.addEventListener('change', () => {
    selectedEngine = engineSelect.value;
    const eng = ENGINES.find(e => e.id === selectedEngine);
    engineName.textContent = eng?.name || selectedEngine;
    chrome.runtime.sendMessage({ type: 'NOVA_SELECT_ENGINE', payload: { engineId: selectedEngine } });
  });

  function addMsg(role, content, meta) {
    const div = document.createElement('div');
    div.className = `msg msg-${role}`;
    div.textContent = content;
    if (meta) {
      const m = document.createElement('div');
      m.className = 'msg-meta';
      m.textContent = meta;
      div.appendChild(m);
    }
    chatArea.appendChild(div);
    chatArea.scrollTop = chatArea.scrollHeight;
  }

  async function sendChat(text) {
    if (!text?.trim()) return;
    chatInput.value = '';
    chatInput.style.height = 'auto';
    addMsg('user', text);

    const typing = document.createElement('div');
    typing.className = 'msg msg-assistant';
    typing.textContent = '⏳ Processing...';
    chatArea.appendChild(typing);
    chatArea.scrollTop = chatArea.scrollHeight;

    try {
      const res = await chrome.runtime.sendMessage({
        type: 'NOVA_CHAT_REQUEST',
        engineId: selectedEngine,
        payload: { messages: [{ role: 'user', content: text }] },
      });
      typing.remove();
      if (res?.content) {
        addMsg('assistant', res.content, `${res.engineName || ''} · att: ${res.attestation || '—'}`);
      } else if (res?.error) {
        addMsg('system', '⚠️ ' + res.error);
      }
    } catch (err) {
      typing.remove();
      addMsg('system', '⚠️ ' + (err.message || err));
    }
  }

  $('chat-send').addEventListener('click', () => sendChat(chatInput.value));
  chatInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(chatInput.value); }
  });
  chatInput.addEventListener('input', () => {
    chatInput.style.height = 'auto';
    chatInput.style.height = Math.min(chatInput.scrollHeight, 120) + 'px';
  });

  // Quick action buttons
  document.querySelectorAll('.quick-btn').forEach(btn => {
    btn.addEventListener('click', () => sendChat(btn.dataset.q));
  });

  // Load history
  chrome.runtime.sendMessage({ type: 'NOVA_GET_HISTORY', payload: {} }, (result) => {
    if (result?.history) {
      result.history.slice(-20).forEach(m => {
        if (m.role === 'user' || m.role === 'assistant') addMsg(m.role, m.content);
      });
    }
  });

  // Restore engine selection
  chrome.runtime.sendMessage({ type: 'NOVA_GET_STATUS', payload: {} }, (status) => {
    if (status?.selectedEngine) {
      selectedEngine = status.selectedEngine;
      engineSelect.value = selectedEngine;
      const eng = ENGINES.find(e => e.id === selectedEngine);
      engineName.textContent = eng?.name || selectedEngine;
    }
  });
})();
</script>
</body>
</html>
