<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>NOVA — Founder Dashboard</title>
<style>
  /* ── Base ── */
  :root {
    --phi: 1.6180339887;
    --gold: #c9a227;
    --gold-dim: #7a5c10;
    --bg: #090c10;
    --bg2: #0f1318;
    --bg3: #161c24;
    --border: #1e2a38;
    --text: #d8e4f0;
    --text-dim: #5a7090;
    --green: #1ecc7a;
    --red: #e84060;
    --blue: #4090e8;
    --purple: #9060e0;
    --radius: 6px;
    --font: 'Courier New', Courier, monospace;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 13px; }

  /* ── Layout ── */
  .shell { display: grid; grid-template-rows: 44px 1fr; height: 100vh; }
  .topbar { background: var(--bg2); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 14px; gap: 10px; }
  .topbar-brand { color: var(--gold); font-size: 15px; font-weight: bold; letter-spacing: 2px; margin-right: 12px; }
  .workspace { display: grid; grid-template-columns: 220px 1fr 300px; height: 100%; overflow: hidden; }

  /* ── Toolbar (left) ── */
  .toolbar { background: var(--bg2); border-right: 1px solid var(--border); display: flex; flex-direction: column; padding: 10px 8px; gap: 4px; overflow-y: auto; }
  .toolbar-section { color: var(--text-dim); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; padding: 8px 4px 4px; }
  .tool-btn {
    display: flex; align-items: center; gap: 8px;
    background: transparent; border: 1px solid transparent;
    color: var(--text); padding: 7px 10px; border-radius: var(--radius);
    cursor: pointer; text-align: left; width: 100%; font: inherit;
    transition: all 0.12s;
  }
  .tool-btn:hover { background: var(--bg3); border-color: var(--border); }
  .tool-btn.active { background: var(--bg3); border-color: var(--gold-dim); color: var(--gold); }
  .tool-btn .icon { font-size: 16px; width: 22px; text-align: center; }
  .tool-btn .label { font-size: 12px; }
  .tool-btn .shortcut { font-size: 9px; color: var(--text-dim); margin-left: auto; }
  .divider { height: 1px; background: var(--border); margin: 6px 0; }

  /* ── Centre panel ── */
  .centre { display: grid; grid-template-rows: 1fr auto; overflow: hidden; }
  .output-area { overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; }

  /* ── Cards ── */
  .card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .card-header { padding: 8px 12px; background: var(--bg3); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
  .card-title { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: var(--gold); }
  .card-badge { font-size: 9px; padding: 2px 6px; border-radius: 3px; background: var(--bg); color: var(--text-dim); }
  .card-body { padding: 12px; }
  .result-line { padding: 4px 0; border-bottom: 1px solid var(--border); display: flex; gap: 8px; }
  .result-line:last-child { border: none; }
  .result-dim { color: var(--gold); min-width: 160px; font-size: 11px; }
  .result-val { color: var(--green); min-width: 80px; font-size: 11px; }
  .result-insight { color: var(--text); font-size: 11px; flex: 1; }

  /* ── Input bar ── */
  .input-bar { border-top: 1px solid var(--border); background: var(--bg2); padding: 10px 14px; display: flex; gap: 8px; align-items: flex-end; }
  .input-box { flex: 1; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font: inherit; padding: 8px 12px; resize: none; min-height: 38px; max-height: 120px; outline: none; }
  .input-box:focus { border-color: var(--gold-dim); }
  .send-btn { background: var(--gold-dim); color: var(--gold); border: none; border-radius: var(--radius); padding: 8px 18px; cursor: pointer; font: inherit; font-weight: bold; }
  .send-btn:hover { background: var(--gold); color: var(--bg); }

  /* ── Right panel ── */
  .right-panel { background: var(--bg2); border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow: hidden; }
  .panel-tabs { display: flex; border-bottom: 1px solid var(--border); }
  .panel-tab { flex: 1; padding: 10px; text-align: center; cursor: pointer; font-size: 11px; color: var(--text-dim); border-bottom: 2px solid transparent; }
  .panel-tab.active { color: var(--gold); border-bottom-color: var(--gold); }
  .panel-body { flex: 1; overflow-y: auto; padding: 10px; }

  /* ── Notepad ── */
  .note-form { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
  .note-input { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); color: var(--text); font: inherit; padding: 6px 8px; outline: none; }
  .note-input:focus { border-color: var(--gold-dim); }
  .note-body-input { resize: vertical; min-height: 80px; }
  .note-save-btn { background: var(--bg3); border: 1px solid var(--gold-dim); color: var(--gold); padding: 5px 10px; border-radius: var(--radius); cursor: pointer; font: inherit; }
  .note-list { display: flex; flex-direction: column; gap: 6px; }
  .note-item { background: var(--bg3); border: 1px solid var(--border); border-radius: var(--radius); padding: 8px; }
  .note-item-title { color: var(--gold); font-size: 11px; margin-bottom: 4px; }
  .note-item-body { color: var(--text); font-size: 11px; line-height: 1.5; }
  .note-item-tags { display: flex; gap: 4px; margin-top: 4px; flex-wrap: wrap; }
  .note-tag { font-size: 9px; padding: 1px 5px; background: var(--bg); border: 1px solid var(--border); border-radius: 3px; color: var(--blue); }
  .note-delete { float: right; background: none; border: none; color: var(--red); cursor: pointer; font-size: 11px; }

  /* ── Framework list ── */
  .fw-item { border-bottom: 1px solid var(--border); padding: 8px 0; cursor: pointer; }
  .fw-item:hover .fw-name { color: var(--gold); }
  .fw-name { font-size: 12px; color: var(--text); }
  .fw-desc { font-size: 10px; color: var(--text-dim); margin-top: 2px; }
  .fw-steps { margin-top: 8px; display: none; }
  .fw-steps.open { display: block; }
  .fw-step { font-size: 10px; color: var(--text); padding: 2px 0; }
  .fw-q { font-size: 10px; color: var(--blue); padding: 1px 0; }

  /* ── Status bar ── */
  .statusbar { grid-column: 1/-1; background: var(--bg3); border-top: 1px solid var(--border); padding: 3px 14px; display: flex; gap: 16px; font-size: 10px; color: var(--text-dim); }
  .status-item { display: flex; gap: 4px; }
  .status-val { color: var(--gold); }

  /* ── Query output ── */
  .query-header { font-size: 10px; color: var(--text-dim); margin-bottom: 6px; }
  .synthesis-box { background: var(--bg); border-left: 2px solid var(--gold-dim); padding: 8px 12px; font-size: 11px; line-height: 1.6; color: var(--text); margin-top: 8px; }
  .sovereignty-ok  { color: var(--green); }
  .sovereignty-bad { color: var(--red); }
  .kuramoto-r      { color: var(--purple); }

  /* ── Blueprint buttons ── */
  .blueprint-grid { display: flex; flex-direction: column; gap: 4px; }
  .bp-btn { background: var(--bg3); border: 1px solid var(--border); color: var(--text); padding: 6px 10px; border-radius: var(--radius); cursor: pointer; text-align: left; font: inherit; font-size: 11px; }
  .bp-btn:hover { border-color: var(--gold-dim); color: var(--gold); }

  /* ── Download area ── */
  .download-area { padding: 10px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
  .dl-btn { flex: 1; padding: 8px; background: var(--bg3); border: 1px solid var(--gold-dim); color: var(--gold); border-radius: var(--radius); cursor: pointer; font: inherit; font-size: 11px; text-align: center; }
  .dl-btn:hover { background: var(--gold-dim); }

  /* ── Pattern pills ── */
  .pattern-grid { display: flex; flex-direction: column; gap: 4px; }
  .pattern-item { background: var(--bg3); border: 1px solid var(--border); padding: 6px 8px; border-radius: var(--radius); cursor: pointer; }
  .pattern-item:hover { border-color: var(--purple); }
  .pattern-name { font-size: 11px; color: var(--purple); }
  .pattern-when { font-size: 10px; color: var(--text-dim); margin-top: 2px; }

  /* ── Scrollbar ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg2); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--gold-dim); }

  /* ── Metric pills in topbar ── */
  .metric { padding: 3px 10px; background: var(--bg3); border: 1px solid var(--border); border-radius: 3px; font-size: 10px; }
  .metric span { color: var(--gold); }
</style>
</head>
<body>
<div class="shell">

<!-- TOP BAR -->
<div class="topbar">
  <div class="topbar-brand">⚡ NOVA</div>
  <div class="metric">φ = <span>1.6180339887</span></div>
  <div class="metric">SOVEREIGNTY_FLOOR = <span>0.75</span></div>
  <div class="metric">LOSS_AVERSION_λ = <span>2.25</span></div>
  <div class="metric">KURAMOTO_K = <span id="k-display">φ</span></div>
  <div class="metric" style="margin-left:auto">R = <span id="r-display">—</span></div>
  <div class="metric">AF_SCORE = <span id="af-display">—</span></div>
  <div class="metric">QUERIES = <span id="q-display">0</span></div>
</div>

<!-- WORKSPACE -->
<div class="workspace">

  <!-- LEFT: TOOLBAR -->
  <div class="toolbar">
    <div class="toolbar-section">AI Tools</div>
    <button class="tool-btn active" onclick="setTool('query')" id="btn-query">
      <span class="icon">⚡</span><span class="label">Sovereign Query</span><span class="shortcut">^Q</span>
    </button>
    <button class="tool-btn" onclick="setTool('analyze')" id="btn-analyze">
      <span class="icon">🔬</span><span class="label">Deep Analyze</span><span class="shortcut">^A</span>
    </button>
    <button class="tool-btn" onclick="setTool('synthesize')" id="btn-synthesize">
      <span class="icon">🧬</span><span class="label">Synthesize</span><span class="shortcut">^S</span>
    </button>
    <button class="tool-btn" onclick="setTool('challenge')" id="btn-challenge">
      <span class="icon">🏛</span><span class="label">Socratic Challenge</span><span class="shortcut">^H</span>
    </button>
    <button class="tool-btn" onclick="setTool('expand')" id="btn-expand">
      <span class="icon">🌐</span><span class="label">Expand</span><span class="shortcut">^E</span>
    </button>
    <button class="tool-btn" onclick="setTool('compress')" id="btn-compress">
      <span class="icon">💎</span><span class="label">Compress</span><span class="shortcut">^K</span>
    </button>
    <button class="tool-btn" onclick="setTool('translate')" id="btn-translate">
      <span class="icon">🗝</span><span class="label">Translate</span><span class="shortcut">^T</span>
    </button>
    <button class="tool-btn" onclick="setTool('timeline')" id="btn-timeline">
      <span class="icon">📅</span><span class="label">Timeline Builder</span><span class="shortcut">^L</span>
    </button>
    <button class="tool-btn" onclick="setTool('network')" id="btn-network">
      <span class="icon">🕸</span><span class="label">Network Map</span><span class="shortcut">^N</span>
    </button>
    <button class="tool-btn" onclick="setTool('simulate')" id="btn-simulate">
      <span class="icon">🔮</span><span class="label">Simulate</span><span class="shortcut">^M</span>
    </button>

    <div class="divider"></div>
    <div class="toolbar-section">Blueprints</div>
    <button class="tool-btn" onclick="runBlueprint('daily-sweep')">
      <span class="icon">☀</span><span class="label">Daily Sweep</span>
    </button>
    <button class="tool-btn" onclick="runBlueprint('fear-check')">
      <span class="icon">😶</span><span class="label">Fear Check</span>
    </button>
    <button class="tool-btn" onclick="runBlueprint('sovereignty-audit')">
      <span class="icon">🛡</span><span class="label">Sovereignty Audit</span>
    </button>
    <button class="tool-btn" onclick="runBlueprint('flow-check')">
      <span class="icon">🌊</span><span class="label">Flow Check</span>
    </button>
    <button class="tool-btn" onclick="runBlueprint('ecology-status')">
      <span class="icon">🌿</span><span class="label">Ecology Status</span>
    </button>
    <button class="tool-btn" onclick="runBlueprint('phi-convergence')">
      <span class="icon">∞</span><span class="label">Phi Convergence</span>
    </button>
  </div>

  <!-- CENTRE: OUTPUT + INPUT -->
  <div class="centre">
    <div class="output-area" id="output"></div>
    <div class="input-bar">
      <textarea class="input-box" id="input-box" placeholder="Ask anything… or just think out loud." rows="1"
        onkeydown="handleKey(event)"></textarea>
      <button class="send-btn" onclick="submit()">RUN →</button>
    </div>
  </div>

  <!-- RIGHT: PANEL -->
  <div class="right-panel">
    <div class="panel-tabs">
      <div class="panel-tab active" onclick="showPanel('notes')" id="tab-notes">Notepad</div>
      <div class="panel-tab" onclick="showPanel('frameworks')" id="tab-frameworks">Frameworks</div>
      <div class="panel-tab" onclick="showPanel('patterns')" id="tab-patterns">Patterns</div>
    </div>

    <!-- NOTEPAD -->
    <div class="panel-body" id="panel-notes">
      <div class="note-form">
        <input class="note-input" id="note-title" placeholder="Note title…" />
        <textarea class="note-input note-body-input" id="note-body" placeholder="Write your note…"></textarea>
        <input class="note-input" id="note-tags" placeholder="Tags (comma-separated)" />
        <button class="note-save-btn" onclick="saveNote()">+ Save Note</button>
      </div>
      <div class="note-list" id="note-list"></div>
    </div>

    <!-- FRAMEWORKS -->
    <div class="panel-body" id="panel-frameworks" style="display:none">
      <div id="framework-list"></div>
    </div>

    <!-- PATTERNS -->
    <div class="panel-body" id="panel-patterns" style="display:none">
      <div class="pattern-grid" id="pattern-list"></div>
    </div>

    <!-- DOWNLOADS -->
    <div class="download-area">
      <button class="dl-btn" onclick="downloadZip()">⬇ Download ZIP</button>
      <button class="dl-btn" onclick="downloadBat()">⬇ Download BAT</button>
    </div>
  </div>

</div><!-- /workspace -->
</div><!-- /shell -->

<script>
// ── Constants ──────────────────────────────────────────────────────────────
const PHI = 1.6180339887498948482;
const PHI_INV = 1 / PHI;
const SOVEREIGNTY_FLOOR = 0.75;
const LOSS_AVERSION_LAMBDA = 2.25;
const KURAMOTO_K = PHI;

// ── State ──────────────────────────────────────────────────────────────────
let activeTool = 'query';
let queryCount = 0;
let afScore = 0;
let notes = [];
let nextNoteId = 0;

// Friston state
let prior = 0.5;
// LV state
let lvX = 1.0, lvY = 0.1;
const LV = { r: PHI_INV, K: PHI * 10, alpha: 0.1, delta: 0.2, beta: 0.05, dt: 0.01 };
// Kuramoto
let oscillators = [];
let kuramotoR = 0;
// Hormetic
let capacity = 0.75, chronicFear = 0;

// ── Kuramoto init ──────────────────────────────────────────────────────────
(function initKuramoto() {
  const scales = ['quantum', 'component', 'organism', 'civilization'];
  scales.forEach((scale, si) => {
    for (let i = 0; i < 8; i++) {
      const id = oscillators.length;
      const phase = (id * 2 * Math.PI * (PHI - 1)) % (2 * Math.PI);
      oscillators.push({ theta: phase, omega: 0.3 + si * 0.2 + (i % 5) * 0.05, scale });
    }
  });
  for (let s = 0; s < 50; s++) stepKuramoto();
})();

function stepKuramoto() {
  const N = oscillators.length;
  const newThetas = oscillators.map(o => {
    let coupling = 0;
    oscillators.forEach(other => { coupling += Math.sin(other.theta - o.theta); });
    return o.theta + 0.01 * (o.omega + (KURAMOTO_K / N) * coupling);
  });
  oscillators.forEach((o, i) => { o.theta = newThetas[i]; });
  let sx = 0, sy = 0;
  oscillators.forEach(o => { sx += Math.sin(o.theta); sy += Math.cos(o.theta); });
  kuramotoR = Math.sqrt(sx * sx + sy * sy) / N;
}

// ── LV step ───────────────────────────────────────────────────────────────
function stepLV(steps = 5) {
  for (let i = 0; i < steps; i++) {
    const dxdt = LV.r * lvX * (1 - lvX / LV.K) - LV.alpha * lvX * lvY;
    const dydt = -LV.delta * lvY + LV.beta * lvX * lvY;
    lvX = Math.max(0, lvX + LV.dt * dxdt);
    lvY = Math.max(0, lvY + LV.dt * dydt);
  }
}

// ── Friston ───────────────────────────────────────────────────────────────
function fristonUpdate(sensory) {
  const error = sensory - prior;
  const fe = error * error;
  prior = prior + 0.1 * PHI_INV * error;
  return fe;
}

// ── Antifragility ─────────────────────────────────────────────────────────
function computeAF() {
  const dominance = (lvX + lvY > 0) ? lvX / (lvX + lvY) : 0;
  return dominance * PHI * (1 - chronicFear);
}

// ── Dimension compute ──────────────────────────────────────────────────────
function computeDimension(dim, payload, tick) {
  switch (dim) {
    case 'fear': {
      const sensory = payload.sensory ?? (Math.random() * 0.2);
      const fe = fristonUpdate(sensory);
      return {
        dim, label: 'Friston Free Energy', value: fe.toFixed(6),
        formula: 'FE = (sensory − prior)²',
        insight: fe < 0.01 ? 'Belief calibrated — near-zero prediction error.'
                : fe > 0.1 ? 'High surprise — update beliefs urgently.'
                : 'Moderate learning state.',
      };
    }
    case 'antifragility': {
      stepLV(10); stepKuramoto();
      const af = computeAF();
      afScore += af;
      return {
        dim, label: 'Antifragility Δ', value: af.toFixed(6),
        formula: 'Δ = dominance × φ × (1 − chronicFear)',
        insight: af > PHI * 0.5 ? 'Antifragile zone — gaining from disorder.'
                : 'Apply stress cycles to build advantage.',
      };
    }
    case 'ecology': {
      stepLV(10);
      const dom = (lvX + lvY > 0) ? lvX / (lvX + lvY) : 0;
      return {
        dim, label: 'LV Dominance', value: dom.toFixed(4),
        formula: 'dx/dt = r·x·(1−x/K) − α·x·y',
        insight: `x=${lvX.toFixed(3)}, y=${lvY.toFixed(3)}. Dominance=${dom.toFixed(3)}.`,
      };
    }
    case 'sovereignty':
    case 'sync': {
      stepKuramoto();
      return {
        dim, label: 'Kuramoto R', value: kuramotoR.toFixed(6),
        formula: 'R = |Σ e^(iθ)| / N',
        insight: kuramotoR >= SOVEREIGNTY_FLOOR
          ? `Sovereign — R=${kuramotoR.toFixed(4)} ≥ ${SOVEREIGNTY_FLOOR}.`
          : `Breach — R=${kuramotoR.toFixed(4)} < ${SOVEREIGNTY_FLOOR}.`,
      };
    }
    case 'reward': {
      const base = payload.base ?? 1;
      const scalar = payload.scalar ?? 0.618;
      const reward = base * PHI * scalar;
      return {
        dim, label: 'Reward Signal L-72', value: reward.toFixed(6),
        formula: 'reward = base × φ × scalar',
        insight: `Signal: ${base} → ${reward.toFixed(4)} after φ-amplification.`,
      };
    }
    case 'law': {
      const loss = payload.loss ?? 1;
      const lr = loss * LOSS_AVERSION_LAMBDA;
      return {
        dim, label: 'Behavioral Asymmetry L-74', value: lr.toFixed(4),
        formula: `lossResponse = loss × λ(${LOSS_AVERSION_LAMBDA})`,
        insight: `Loss of ${loss} felt as ${lr.toFixed(4)} — ${LOSS_AVERSION_LAMBDA}× amplified.`,
      };
    }
    case 'flow': {
      const skill = payload.skill ?? 0.7;
      const challenge = payload.challenge ?? 0.7;
      const fs = Math.max(0, 1 - Math.abs(skill - challenge) / Math.max(skill, challenge, 1e-9));
      return {
        dim, label: 'Flow State L-76', value: fs.toFixed(6),
        formula: 'flowScore = 1 − |skill − challenge| / max(skill, challenge)',
        insight: fs >= PHI_INV ? `Flow confirmed — score ${fs.toFixed(3)} ≥ φ⁻¹.`
                : `Flow disrupted — mismatch at ${fs.toFixed(3)}.`,
      };
    }
    case 'time': {
      const reward = payload.reward ?? 100;
      const delay = payload.delay ?? 5;
      const k = payload.k ?? 0.1;
      const pv = reward / (1 + k * delay * PHI_INV);
      return {
        dim, label: 'Temporal Discounting L-79', value: pv.toFixed(4),
        formula: 'PV = reward / (1 + k × delay × φ⁻¹)',
        insight: `Future ${reward} in ${delay} units → PV ${pv.toFixed(4)} with φ patience.`,
      };
    }
    case 'phi': {
      const n = Math.round(payload.n ?? 10);
      let a = 0, b = 1;
      for (let i = 0; i < n - 1; i++) { const t = a + b; a = b; b = t; }
      const conv = a > 0 ? b / a : PHI;
      return {
        dim, label: `Fibonacci F(${n})`, value: conv.toFixed(10),
        formula: 'F(n+1)/F(n) → φ',
        insight: `After ${n} terms: ratio = ${conv.toFixed(10)} (φ = ${PHI.toFixed(10)}).`,
      };
    }
    case 'observe': {
      const r = payload.r ?? 0.8;
      const prob = payload.prob ?? 0.3;
      const score = PHI * PHI * r * prob;
      return {
        dim, label: 'Observer O(x)', value: score.toFixed(6),
        formula: 'O(x) = φ^d × R(x) × P(anomaly|x)',
        insight: score > 1 ? `High anomaly signal O(x)=${score.toFixed(4)}.`
                : `Normal O(x)=${score.toFixed(4)}.`,
      };
    }
    default:
      return { dim, label: dim, value: '—', formula: '—', insight: `Unknown dimension.` };
  }
}

// ── Query runner ──────────────────────────────────────────────────────────
function runQuery(question, dims, payload = {}) {
  if (!dims || dims.includes('all')) {
    dims = ['fear', 'antifragility', 'ecology', 'sovereignty', 'reward', 'flow', 'time'];
  }
  const tick = queryCount++;
  const results = dims.map(d => computeDimension(d, payload, tick));
  stepKuramoto();
  const sovereign = kuramotoR >= SOVEREIGNTY_FLOOR;
  const af = computeAF();

// ── Submit ─────────────────────────────────────────────────────────────────
function submit() {
  const box = document.getElementById('input-box');
  const input = box.value.trim();
  if (!input) return;
  box.value = '';
  box.style.height = '';
  const fn = TOOLS[activeTool];
  if (fn) fn(input);
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submit(); }
  const box = e.target;
  box.style.height = 'auto';
  box.style.height = Math.min(box.scrollHeight, 120) + 'px';
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (!e.ctrlKey && !e.metaKey) return;
  const map = { q:'query', a:'analyze', s:'synthesize', h:'challenge',
                e:'expand', k:'compress', t:'translate', l:'timeline',
                n:'network', m:'simulate' };
  const id = map[e.key.toLowerCase()];
  if (id) { e.preventDefault(); setTool(id); }
});

  const tags  = document.getElementById('note-tags').value.split(',').map(t => t.trim()).filter(Boolean);

function triggerDownload(filename, content, mime) {
  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
